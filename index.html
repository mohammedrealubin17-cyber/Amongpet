<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Tiny Among Us</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: #0d0d0d;
    color: white;
    text-align: center;
  }h1 { margin-top: 40px; }

.btn { margin: 15px; padding: 15px 25px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; }

.android { background: #3ddc84; } .ios { background: #007aff; color: white; }

#preview { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }

#phone { width: 300px; height: 600px; background: #222; margin: 40px auto; border-radius: 30px; position: relative; overflow: hidden; }

#character { width: 40px; height: 60px; background: red; border-radius: 20px 20px 10px 10px; position: absolute; top: 200px; left: 120px; }

#visor { width: 25px; height: 15px; background: lightblue; border-radius: 10px; position: absolute; top: 15px; left: 7px; }

#okBtn { margin-top: 10px; padding: 10px 20px; font-size: 18px; } </style>

</head>
<body><h1>Download Tiny Among Us</h1>
<button class="btn android" onclick="showPreview()">Download for Android</button>
<button class="btn ios" onclick="showPreview()">Download for iOS</button><div id="preview">
  <div id="phone">
    <div id="character">
      <div id="visor"></div>
    </div>
  </div>
  <button id="okBtn" onclick="hidePreview()">OK</button>
</div><script>
function showPreview() {
  document.getElementById("preview").style.display = "block";
}

function hidePreview() {
  document.getElementById("preview").style.display = "none";
}

const char = document.getElementById("character");
let x = 120;
let y = 200;
let vx = 1.5;
let vy = 0;
let gravity = 0.4;

let dragging = false;
let offsetX, offsetY;

char.addEventListener("touchstart", (e) => {
  dragging = true;
  const t = e.touches[0];
  offsetX = t.clientX - x;
  offsetY = t.clientY - y;
});

document.addEventListener("touchmove", (e) => {
  if (dragging) {
    const t = e.touches[0];
    x = t.clientX - offsetX - (window.innerWidth/2 - 150);
    y = t.clientY - offsetY - 40;
  }
});

document.addEventListener("touchend", () => {
  dragging = false;
});

function loop() {
  if (!dragging) {
    x += vx;

    // bounce on walls
    if (x < 0 || x > 260) vx *= -1;

    vy += gravity;
    y += vy;

    // ground
    if (y > 540) {
      y = 540;
      vy = -8; // auto jump
    }
  }

  char.style.left = x + "px";
  char.style.top = y + "px";

  requestAnimationFrame(loop);
}

loop();
</script></body>
</html>
