<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiny Among Us Advanced</title>
<style>
  body { margin:0; background:#0d0d0d; color:white; font-family:sans-serif; text-align:center; }.btn { margin:15px; padding:15px 25px; font-size:18px; border:none; border-radius:10px; cursor:pointer; } .android { background:#3ddc84; } .ios { background:#007aff; color:white; }

#preview { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); }

#phone { width:300px; height:600px; background:#222; margin:40px auto; border-radius:30px; position:relative; overflow:hidden; }

.crewmate { width:40px; height:60px; background:red; border-radius:20px 20px 10px 10px; position:absolute; }

.visor { width:25px; height:15px; background:lightblue; border-radius:10px; position:absolute; top:15px; left:7px; }

#okBtn { margin-top:10px; padding:10px 20px; font-size:18px; }

#installHint { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); background:#333; padding:10px 15px; border-radius:10px; display:none; } </style>

</head>
<body><h1>Download Tiny Among Us</h1>
<button class="btn android" onclick="startInstall()">Download for Android</button>
<button class="btn ios" onclick="startInstall()">Download for iOS</button><div id="preview">
  <div id="phone"></div>
  <button id="okBtn" onclick="hidePreview()">OK</button>
</div><div id="installHint">Tap ⋮ → Add to Home Screen</div><audio id="popSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
const phone = document.getElementById("phone");
const sound = document.getElementById("popSound");

let crewmates = [];

function createCrewmate(x,y,color){
  const c = document.createElement("div");
  c.className = "crewmate";
  c.style.background = color;
  c.style.left = x+"px";
  c.style.top = y+"px";

  const visor = document.createElement("div");
  visor.className = "visor";
  c.appendChild(visor);

  phone.appendChild(c);

  let obj = {el:c,x,y,vx:Math.random()*2+1,vy:0,drag:false};

  // FIXED DRAG
  c.addEventListener("touchstart", (e)=>{
    obj.drag=true;
  });

  document.addEventListener("touchmove", (e)=>{
    if(obj.drag){
      const rect = phone.getBoundingClientRect();
      obj.x = e.touches[0].clientX - rect.left - 20;
      obj.y = e.touches[0].clientY - rect.top - 30;
    }
  });

  document.addEventListener("touchend", ()=> obj.drag=false);

  crewmates.push(obj);
}

function startInstall(){
  document.getElementById("preview").style.display="block";
  document.getElementById("installHint").style.display="block";
  sound.play();

  phone.innerHTML="";
  crewmates=[];

  // MULTIPLE CREWMATES
  createCrewmate(50,100,"red");
  createCrewmate(150,200,"blue");
  createCrewmate(100,300,"green");
}

function hidePreview(){
  document.getElementById("preview").style.display="none";
  document.getElementById("installHint").style.display="none";
}

function loop(){
  crewmates.forEach(c=>{
    if(!c.drag){
      c.x += c.vx;

      // WALL CLIMB
      if(c.x < 0 || c.x > 260){
        c.vx *= -1;
        c.vy = -8; // climb jump
      }

      c.vy += 0.4;
      c.y += c.vy;

      // FLOOR
      if(c.y > 540){
        c.y = 540;
        c.vy = -7;
      }

      // CEILING
      if(c.y < 0){
        c.y = 0;
        c.vy = 2;
      }
    }

    c.el.style.left = c.x+"px";
    c.el.style.top = c.y+"px";
  });

  requestAnimationFrame(loop);
}

loop();
</script></body>
</html>
