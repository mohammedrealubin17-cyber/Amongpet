<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Among Pet</title>
<style>
  body { margin:0; font-family:sans-serif; background:#0b0b0f; color:white; text-align:center; overflow:hidden; }#ui { padding:10px; }

.bar { width:80%; height:16px; background:#333; margin:8px auto; border-radius:10px; overflow:hidden; } .fill { height:100%; width:100%; transition:0.2s; }

#pet { width:90px; margin:10px auto; font-size:60px; user-select:none; }

button { padding:10px 18px; margin:6px; border:none; border-radius:10px; font-size:15px; }

#world { position:fixed; inset:0; overflow:hidden; }

.crewmate { width:50px; height:70px; position:absolute; transform-origin:center; }

.bubble { width:100%; height:100%; }

#night { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; }

#hint { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); font-size:12px; opacity:0.7; } </style>

</head>
<body><div id="ui">
  <h2>🐾 Among Pet</h2>  <div id="pet">🔴</div>  <div>Hunger</div>
  <div class="bar"><div id="h" class="fill" style="background:#ff4d4d"></div></div>  <div>Energy</div>
  <div class="bar"><div id="e" class="fill" style="background:#4da6ff"></div></div>  <div>Happiness</div>
  <div class="bar"><div id="ha" class="fill" style="background:#4dff88"></div></div><button onclick="feed()">🍔 Feed</button> <button onclick="sleep()">😴 Sleep</button>

</div><div id="world"></div>
<div id="night"></div>
<div id="hint">Tap crewmates at night 👀</div><script>
let hunger=100, energy=100, happy=100;
let night=false;
const world=document.getElementById("world");
const nightScreen=document.getElementById("night");

function svgCrew(color){
  return `
  <svg class='bubble' viewBox='0 0 64 96'>
    <rect x='10' y='20' width='44' height='60' rx='20' fill='${color}'/>
    <rect x='16' y='8' width='32' height='28' rx='14' fill='${color}'/>
    <ellipse cx='40' cy='42' rx='12' ry='8' fill='#aee9ff'/>
  </svg>`;
}

function makeCrew(x,y,color,isImpostor=false){
  const d=document.createElement("div");
  d.className="crewmate";
  d.innerHTML=svgCrew(color);
  world.appendChild(d);

  let obj={el:d,x,y,vx:(Math.random()<0.5?-1:1)*1.2,vy:0,imp:isImpostor,drag:false};

  d.addEventListener("touchstart",()=>obj.drag=true);
  document.addEventListener("touchend",()=>obj.drag=false);
  document.addEventListener("touchmove",e=>{
    if(obj.drag){
      const r=world.getBoundingClientRect();
      obj.x=e.touches[0].clientX-r.left-25;
      obj.y=e.touches[0].clientY-r.top-35;
    }
  });

  obj.el.onclick=()=>{
    if(night){
      if(obj.imp){ winNight(true); } else { winNight(false); }
    }
  };

  crew.push(obj);
}

let crew=[];

function spawnDay(){
  world.innerHTML="";
  crew=[];
  for(let i=0;i<4;i++){
    makeCrew(80*i+40,200,"#ff3b3b",false);
  }
}

function startNight(){
  night=true;
  nightScreen.style.display="block";
  nightScreen.innerHTML="";

  world.innerHTML="";
  crew=[];

  let imp=Math.floor(Math.random()*5);

  for(let i=0;i<5;i++){
    let c=document.createElement("div");
    c.className="crewmate";
    c.innerHTML=svgCrew(i===imp?"black":"#ff3b3b");
    nightScreen.appendChild(c);

    let obj={
      el:c,
      x:Math.random()*250,
      y:Math.random()*400,
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-0.5)*2,
      imp:i===imp
    };

    c.onclick=()=>winNight(obj.imp);
    crew.push(obj);
  }
}

function winNight(ok){
  night=false;
  nightScreen.style.display="none";

  if(ok) happy+=20;
  else { hunger-=20; energy-=20; }

  spawnDay();
}

function feed(){ hunger+=20; happy+=5; }
function sleep(){ energy+=30; }

function update(){
  hunger-=0.3;
  energy-=0.2;
  happy-=0.1;

  document.getElementById("h").style.width=hunger+"%";
  document.getElementById("e").style.width=energy+"%";
  document.getElementById("ha").style.width=happy+"%";

  if(!night && Math.random()<0.005) startNight();

  crew.forEach(c=>{
    if(!c.drag){
      // SMART AI
      let target = crew[Math.floor(Math.random()*crew.length)];
      if(target && target!==c){
        c.vx += (target.x-c.x)*0.001;
        c.vy += (target.y-c.y)*0.001;
      }

      c.x += c.vx;
      c.y += c.vy;

      // WALL CRAWL
      if(c.x<0||c.x>300){ c.vx*=-1; c.vy=-2; }
      if(c.y<0) c.y=0;
      if(c.y>500){ c.y=500; c.vy=-3; }

      c.el.style.left=c.x+"px";
      c.el.style.top=c.y+"px";
    }
  });

  requestAnimationFrame(update);
}

spawnDay();
update();
</script></body>
</html>
